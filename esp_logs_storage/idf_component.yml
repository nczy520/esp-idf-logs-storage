version: "2.0.0"
description: "Storage-backed log manager for ESP-IDF with automatic rotation and space control (SPIFFS backend)."
license: "Apache-2.0"
url: "https://github.com/nczy520/esp-idf-logs-storage"
repository: "https://github.com/nczy520/esp-idf-logs-storage.git"
documentation: "https://github.com/nczy520/esp-idf-logs-storage#readme"
issues: "https://github.com/nczy520/esp-idf-logs-storage/issues"
maintainers:
  - "nczy520"
tags:
  - logging
  - filesystem
  - storage
targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c3
  - esp32c5
  - esp32c6
  - esp32c61
  - esp32h2
  - esp32p4
dependencies:
  idf:
    version: ">=6.0.0"
files:
  exclude:
    - "build/**/*"
    - ".vscode/**/*"
    - "*.lock"
