version: "1.1.0"
description: "SPIFFS-based log manager for ESP-IDF with automatic rotation and space control."
license: "GPL-3.0-or-later"
url: "https://github.com/nczy520/esp-idf-logs-spiffs"
repository: "https://github.com/nczy520/esp-idf-logs-spiffs.git"
documentation: "https://github.com/nczy520/esp-idf-logs-spiffs#readme"
issues: "https://github.com/nczy520/esp-idf-logs-spiffs/issues"
maintainers:
  - "nczy520"
tags:
  - logging
  - spiffs
  - filesystem
  - storage
targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c3
  - esp32c6
dependencies:
  idf:
    version: ">=6.0.0"
files:
  exclude:
    - ".github/**/*"
    - "build/**/*"
    - ".vscode/**/*"